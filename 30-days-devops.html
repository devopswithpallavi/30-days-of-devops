<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>30 Days of DevOps — devopswithpallavi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#080617;
  color:#fff;
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  padding:0;
}

/* ── NAVBAR ── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 2.5rem;
  border-bottom:1px solid rgba(139,92,246,0.15);
  position:sticky;top:0;
  background:rgba(8,6,23,0.85);
  backdrop-filter:blur(12px);
  z-index:100;
}
.nav-logo{
  font-weight:800;font-size:16px;
  background:linear-gradient(90deg,#A78BFA,#60A5FA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-tag{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:rgba(167,139,250,0.6);letter-spacing:.1em;
}

/* ── HERO ── */
.hero{
  max-width:1080px;margin:0 auto;
  padding:4rem 2.5rem 3rem;
  position:relative;text-align:center;
}
.hero-glow-l{
  position:absolute;top:-80px;left:-60px;
  width:420px;height:420px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,0.25) 0%,transparent 65%);
  pointer-events:none;
}
.hero-glow-r{
  position:absolute;top:-40px;right:-60px;
  width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(37,99,235,0.2) 0%,transparent 65%);
  pointer-events:none;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(139,92,246,0.12);
  border:1px solid rgba(139,92,246,0.35);
  color:#C4B5FD;
  font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;
  padding:6px 18px;border-radius:99px;margin-bottom:1.5rem;
  position:relative;
}
.pulse{width:7px;height:7px;border-radius:50%;background:#A78BFA;position:relative;flex-shrink:0;}
.pulse::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  background:rgba(167,139,250,0.45);
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.8);opacity:0;}}

.hero h1{
  font-size:clamp(2.8rem,6vw,4.5rem);
  font-weight:800;line-height:1.05;
  margin-bottom:1rem;position:relative;
}
.hero h1 .white{color:#fff;}
.hero h1 .grad{
  background:linear-gradient(90deg,#A78BFA 0%,#818CF8 40%,#60A5FA 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;
}
.hero-sub{
  font-family:'JetBrains Mono',monospace;font-size:14px;
  color:rgba(255,255,255,0.4);
  position:relative;margin-bottom:2.5rem;
}

/* ── STATS ── */
.stats-wrap{max-width:1080px;margin:0 auto;padding:0 2.5rem 2rem;}
.stats-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  margin-bottom:1.5rem;
}
.stat{
  border-radius:18px;padding:1.4rem 1rem;text-align:center;
  background:rgba(15,10,42,0.8);
  border:1.5px solid rgba(139,92,246,0.2);
  position:relative;overflow:hidden;
}
.stat::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(37,99,235,0.06));
  pointer-events:none;
}
.stat-lbl{
  font-size:11px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(196,181,253,0.6);margin-bottom:6px;position:relative;
}
.stat-num{
  font-size:2.2rem;font-weight:800;position:relative;
  background:linear-gradient(135deg,#A78BFA,#60A5FA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── PROGRESS BAR ── */
.bar-section{margin-bottom:2rem;}
.bar-meta{
  display:flex;justify-content:space-between;
  font-size:13px;font-weight:600;
  color:rgba(196,181,253,0.7);margin-bottom:8px;
}
.bar-track{
  height:10px;
  background:rgba(139,92,246,0.1);
  border-radius:99px;overflow:hidden;
  border:1px solid rgba(139,92,246,0.2);
}
.bar-fill{
  height:100%;border-radius:99px;
  background:linear-gradient(90deg,#7C3AED,#6366F1,#3B82F6);
  position:relative;overflow:hidden;
  transition:width .8s cubic-bezier(.4,0,.2,1);
}
.bar-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(250%);}}

/* ── GRID ── */
.grid-wrap{max-width:1080px;margin:0 auto;padding:0 2.5rem 4rem;}
.sec-lbl{
  font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(167,139,250,0.5);margin-bottom:14px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
}

/* ── CARDS ── */
.card{
  border-radius:18px;padding:16px;
  background:rgba(15,10,42,0.7);
  border:1.5px solid rgba(139,92,246,0.1);
  display:flex;flex-direction:column;gap:8px;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;overflow:hidden;cursor:default;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.04),transparent);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-4px);
  border-color:rgba(139,92,246,0.35);
  box-shadow:0 8px 32px rgba(124,58,237,0.15);
}
.card.done{
  background:linear-gradient(140deg,rgba(26,15,58,0.95) 0%,rgba(15,26,53,0.95) 100%);
  border-color:rgba(139,92,246,0.45);
}
.card.done::before{
  background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(37,99,235,0.07));
}
.card.done:hover{
  box-shadow:0 8px 40px rgba(124,58,237,0.25);
}

.card-top{display:flex;align-items:center;justify-content:space-between;}
.day-pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;
  padding:3px 10px;border-radius:99px;
  background:rgba(139,92,246,0.1);
  border:1px solid rgba(139,92,246,0.18);
  color:rgba(196,181,253,0.5);
}
.card.done .day-pill{
  background:linear-gradient(90deg,#7C3AED,#3B82F6);
  border-color:transparent;color:#fff;font-weight:600;
}
.badge{
  width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,#7C3AED,#3B82F6);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 12px rgba(124,58,237,0.4);
}
.badge svg{display:block;}

.card-topic{
  font-size:14px;font-weight:700;line-height:1.3;flex:1;
  color:rgba(255,255,255,0.18);
}
.card.done .card-topic{color:#E0D9FF;}

.card-desc{
  font-size:11px;line-height:1.5;
  color:rgba(167,139,250,0.55);
}

.card-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;text-decoration:none;
  margin-top:4px;padding:7px 16px;border-radius:99px;width:fit-content;
  background:linear-gradient(90deg,#7C3AED,#3B82F6);
  color:#fff;position:relative;overflow:hidden;
  box-shadow:0 2px 16px rgba(124,58,237,0.3);
  transition:box-shadow .2s,opacity .15s;
}
.card-link::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
  transform:translateX(-100%);transition:transform .5s;
}
.card-link:hover{box-shadow:0 4px 24px rgba(124,58,237,0.5);}
.card-link:hover::before{transform:translateX(150%);}

.card-soon{
  font-size:10px;color:rgba(139,92,246,0.25);
  margin-top:4px;font-family:'JetBrains Mono',monospace;
}

/* ── FOOTER ── */
.footer{
  text-align:center;padding:2rem;
  border-top:1px solid rgba(139,92,246,0.1);
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:rgba(167,139,250,0.3);
}
.footer span{
  background:linear-gradient(90deg,#A78BFA,#60A5FA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .hero{padding:3rem 1.2rem 2rem;}
  .stats-wrap,.grid-wrap{padding:0 1.2rem 3rem;}
  .nav{padding:1rem 1.2rem;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));}
}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">devopswithpallavi</span>
  <span class="nav-tag">// 30 days · 30 topics</span>
</nav>

<div class="hero">
  <div class="hero-glow-l"></div>
  <div class="hero-glow-r"></div>
  <div class="hero-badge"><span class="pulse"></span> #30DaysOfDevOps · In Progress</div>
  <h1>
    <span class="white">30 Days of</span>
    <span class="grad">DevOps</span>
  </h1>
  <p class="hero-sub">// one topic · one day · 30 days straight</p>
</div>

<div class="stats-wrap">
  <div class="stats-row">
    <div class="stat">
      <p class="stat-lbl">Completed</p>
      <p class="stat-num" id="s-done">0</p>
    </div>
    <div class="stat">
      <p class="stat-lbl">Remaining</p>
      <p class="stat-num" id="s-left">30</p>
    </div>
    <div class="stat">
      <p class="stat-lbl">Progress</p>
      <p class="stat-num" id="s-pct">0%</p>
    </div>
  </div>

  <div class="bar-section">
    <div class="bar-meta">
      <span id="bar-lbl">0 of 30 days complete</span>
      <span id="bar-pct-lbl">0%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="grid-wrap">
  <p class="sec-lbl">All 30 days</p>
  <div class="grid" id="grid"></div>
</div>

<div class="footer">
  built with 💜 by <span>devopswithpallavi</span> · #30DaysOfDevOps
</div>

<script>
/* ✏️ नवीन day add करायला इथे topic, desc, link भरा */
const days = [
  {
    topic: "Git & GitHub",
    desc:  "Version control · branching · remote workflow · SSH keys",
    link:  "https://devopswithpallavi.github.io/30-days-of-devops/day-01-git-github/"
  },
  {
    topic: "Linux",
    desc:  "Architecture · file system · permissions · processes",
    link:  "https://devopswithpallavi.github.io/30-days-of-devops/day-02-linux/linux.html"
  },
  {
    topic: "Docker",
    desc:  "Containers · images · Dockerfile · volumes · compose",
    link:  "https://devopswithpallavi.github.io/30-days-of-devops/day-03-docker/day03-docker-notes.html"
  },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
  { topic:"", desc:"", link:"" },
];

const checkSVG = `<svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,6 5,9 10,3"/></svg>`;
const linkSVG  = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`;

const grid = document.getElementById('grid');
let done = 0;

days.forEach((d, i) => {
  const n = i + 1;
  const isDone = !!(d.topic || d.link);
  if (isDone) done++;

  const card = document.createElement('div');
  card.className = 'card' + (isDone ? ' done' : '');
  card.innerHTML = `
    <div class="card-top">
      <span class="day-pill">Day ${String(n).padStart(2,'0')}</span>
      ${isDone ? `<div class="badge">${checkSVG}</div>` : ''}
    </div>
    <p class="card-topic">${d.topic || '<span style="opacity:.25">Coming soon</span>'}</p>
    ${d.desc ? `<p class="card-desc">${d.desc}</p>` : ''}
    ${d.link
      ? `<a class="card-link" href="${d.link}" target="_blank" rel="noopener">${linkSVG} View Notes</a>`
      : `<span class="card-soon">// not published yet</span>`}
  `;
  grid.appendChild(card);
});

const pct = Math.round((done / 30) * 100);
document.getElementById('s-done').textContent    = done;
document.getElementById('s-left').textContent    = 30 - done;
document.getElementById('s-pct').textContent     = pct + '%';
document.getElementById('bar-lbl').textContent   = `${done} of 30 days complete`;
document.getElementById('bar-pct-lbl').textContent = pct + '%';
document.getElementById('bar').style.width       = pct + '%';
</script>
</body>
</html>
